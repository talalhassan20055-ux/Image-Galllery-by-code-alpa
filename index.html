<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Image Gallery</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <header>
        <h1>Nature Gallery</h1>
        <p>Beautiful moments captured from nature around the world.</p>
    </header>

    <div class="gallery">

        <img src="images/nature1.jpg" alt="Mountain" class="gallery-img">

        <img src="images/nature2.jpg" alt="Sunset" class="gallery-img">

        <img src="images/nature3.jpg" alt="Forest" class="gallery-img">

        <img src="images/nature4.jpg" alt="Lake" class="gallery-img">

        <img src="images/nature5.jpg" alt="Flowers" class="gallery-img">

        <img src="images/nature6.jpg" alt="Beach" class="gallery-img">

    </div>

</div>

<!-- Lightbox -->

<div class="lightbox" id="lightbox">

    <span class="close-btn" id="closeBtn">&times;</span>

    <span class="prev-btn" id="prevBtn">&#10094;</span>

    <img class="lightbox-img" id="lightboxImg">

    <span class="next-btn" id="nextBtn">&#10095;</span>

</div>

<script src="script.js"></script>

</body>
